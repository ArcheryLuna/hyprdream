# Display configuration
# To see available monitors: hyprctl monitors all

# DP-2: 1080p vertical, left side
monitor = DP-2, 1920x1080@165, 5120x0, 1, transform, 1

# DP-3: 5120x1440 ultrawide, right of DP-2 (1080px offset = rotated DP-2 width)
monitor = DP-3, 5120x1440@240, 0x0, 1

# Workspace assignments (optional):
# workspace = 1, monitor:DP-3
# workspace = 2, monitor:DP-2
