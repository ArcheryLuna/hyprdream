# Window rules (Hyprland 0.53+ syntax)

windowrule = idle_inhibit fullscreen, match:fullscreen 1

windowrule = float on, match:class ^(polkit-gnome-authentication-agent-1)$
windowrule = float on, match:class ^(nm-connection-editor|blueman-manager)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(eog)$
windowrule = float on, match:class ^(gpicview)$
windowrule = float on, match:class ^(walker)$
windowrule = float on, match:class ^(gnome-system-monitor)$
windowrule = float on, match:class ^(yad)$

# Opacity
windowrule = opacity 0.9 0.6, match:class ^(walker)$
windowrule = opacity 0.9 0.8, match:class ^(kitty)$
windowrule = opacity 0.95 0.85, match:class ^(gpicview)$
windowrule = opacity 0.9 0.7, match:class ^(yad)$
windowrule = opacity 0.9 0.7, match:class ^(tidal-hifi)$
windowrule = opacity 0.9 0.7, match:class ^(steam)$
windowrule = opacity 1 1, match:title ^(Picture-in-Picture)$

# Layer blur
layerrule = blur on, match:namespace logout_dialog
layerrule = blur on, match:namespace ^(awww-daemon)$
layerrule = blur on, match:namespace ^(walker)$
# layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace swaync
layerrule = blur on, match:namespace swaync-client
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = blur on, match:namespace ^(swaync)$
layerrule = blur on, match:namespace ^(swaync-client)$

# Layer blur tweaks
layerrule = xray unset, match:namespace ^(walker)$
layerrule = ignore_alpha 0, match:namespace ^(walker)$
layerrule = ignore_alpha 0, match:namespace swaync
layerrule = ignore_alpha 0, match:namespace swaync-client
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace ^(swaync)$
layerrule = ignore_alpha 0, match:namespace ^(swaync-client)$
layerrule = ignore_alpha 0.5, match:namespace swaync
layerrule = ignore_alpha 0.5, match:namespace swaync-client
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace ^(swaync)$
layerrule = ignore_alpha 0.5, match:namespace ^(swaync-client)$

# Picture-in-Picture
windowrule = opacity 0.95 0.75, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$
windowrule = move 72% 7%, match:title ^(Picture-in-Picture)$

# xwayland video bridge
windowrule = opacity 0.0 override 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on, match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur on, match:class ^(xwaylandvideobridge)$
